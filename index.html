<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麥當勞 - 稍候片刻</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="brand-title">M</h1> 
        
        <h2>哎呀！我們的薯條鍋暫時過熱了 🍟</h2>
        <p>工程師們正全速搶修中，請不要擔心，您的訂單資料都很安全。<br>在等待的同時，要不要先來點虛擬薯條？</p>
        
        <div class="interactive-area">
            <button id="fry-btn">🍟 炸一根薯條</button>
            <p>你已經炸了 <span id="fry-count">0</span> 根薯條！</p>
        </div>

        <button class="retry-btn" onclick="location.reload()">重新整理頁面</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
